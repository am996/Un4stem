<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restricted Access - UN4STEM</title>
  <link rel="icon" href="assets/illustrations/logo2.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="styles.css?v=1.1.1">
  <style>
    body.secret-dark {
      background: #0a0f1e; /* Deep space navy */
      color: #ffffff;
    }
    .lock-input {
      background: #161e2e;
      border: 3px solid #2563eb;
      color: #fff;
      padding: 15px 25px;
      border-radius: 12px;
      font-size: 18px;
      width: 100%;
      max-width: 300px;
      outline: none;
      transition: all 0.3s ease;
    }
    .lock-input:focus {
      border-color: #fcd34d; /* Gold focus accent */
      box-shadow: 0 0 15px rgba(252, 211, 77, 0.3);
    }
    #error-msg {
      color: #fca5a5;
      font-weight: 600;
      margin-top: 15px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body class="loaded secret-dark">

<div class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px 20px;">
  
  <div id="lock-screen">
    <div style="font-size: 60px; margin-bottom: 20px;">🔒</div>
    <h1 style="color: #fff;">Classified Content</h1>
    <p class="subtitle" style="margin-bottom: 30px; color: rgba(255,255,255,0.7);">This area is restricted to UN4STEM Administration.<br>Please enter the verification passcode.</p>
    
    <input type="password" id="passcode" class="lock-input" placeholder="Enter Passcode">
    <br>
    <button class="btn" style="margin-top: 20px;" onclick="checkPasscode()">Unlock Access</button>
    <p id="error-msg">Incorrect Key. Access Denied.</p>
  </div>

  <div id="video-area" style="display: none; animation: riseIn 0.5s ease both;">
    <h2 style="color: #fff;">Presidential Archives</h2>
    <p class="subtitle" style="margin-bottom: 30px; color: #bae6fd;">Access Granted. Viewing sensitive file: <em>lol-video.mp4</em></p>
    
    <div class="image-frame" style="max-width: 800px; background: #000; margin-left: auto; margin-right: auto;">
      <video id="secret-video" controls style="width: 100%; display: block; border-radius: inherit;">
        <source src="assets/videos/lol-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
    
    <br><br>
    <a href="index.html" class="back-link" style="font-size: 18px; color: #fff;">← Return to Public Site</a>
  </div>

</div>

<script>
  function checkPasscode() {
    const code = document.getElementById('passcode').value.toLowerCase();
    const lockScreen = document.getElementById('lock-screen');
    const videoArea = document.getElementById('video-area');
    const video = document.getElementById('secret-video');
    const errorMsg = document.getElementById('error-msg');

    if (code === 'deltarune') {
      lockScreen.classList.add('unlock-animation');
      setTimeout(() => {
        lockScreen.style.display = 'none';
        videoArea.style.display = 'block';
        video.play();
      }, 600);
    } else {
      errorMsg.style.opacity = "1";
      lockScreen.classList.remove('shake');
      void lockScreen.offsetWidth; // Trigger reflow to restart animation
      lockScreen.classList.add('shake');
    }
  }

  // Allow "Enter" key to submit the password
  document.getElementById('passcode').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') checkPasscode();
  });
</script>

</body>
</html>
