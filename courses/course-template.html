<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Detail - UN4STEM</title>
  <!-- Note the ../ to reach the root directory -->
  <link rel="stylesheet" href="../styles.css">
</head>

<!-- Update data-course to match the key in course-data.js (e.g., "physics", "chemistry") -->
<body data-course="REPLACE_WITH_COURSE_ID">

<nav class="nav">
  <div class="nav-inner">
    <strong>UN4STEM</strong>
    <div>
      <a href="../index.html">Home</a>
      <a href="../about.html">About</a>
      <a href="../programs.html">Programs</a>
      <a href="../mentors.html">Mentors</a>
      <a href="../impact.html">Impact</a>
      <a href="../apply.html">Apply</a>
      <a href="../donate.html">Donate</a>
    </div>
  </div>
</nav>

<div class="container course-detail">
  
  <header>
    <div>
      <div class="course-meta">
        <span class="pill" id="course-category">Category</span>
        <span class="pill" id="course-level">Level</span>
      </div>
      <h1 id="course-title">Loading...</h1>
      <p class="subtitle" id="course-subtitle"></p>
      <a href="../programs.html" class="back-link">← Back to all programs</a>
    </div>
    
    <div class="image-frame hero-image">
      <img id="course-illustration" class="clipart-image" src="" alt="Course Illustration">
    </div>
  </header>

  <section>
    <div class="detail-grid">
      <!-- Overview -->
      <div class="detail-panel full">
        <h2>Overview</h2>
        <p id="course-overview"></p>
      </div>

      <!-- Learning Outcomes -->
      <div class="detail-panel">
        <h2>What You'll Learn</h2>
        <ul id="course-outcomes"></ul>
      </div>

      <!-- Key Topics -->
      <div class="detail-panel">
        <h2>Key Topics</h2>
        <ul id="course-topics"></ul>
      </div>

      <!-- Project -->
      <div class="detail-panel">
        <h2>Final Project</h2>
        <p id="course-project"></p>
      </div>

      <!-- Best For -->
      <div class="detail-panel">
        <h2>Who is this for?</h2>
        <p id="course-best-for"></p>
      </div>
    </div>

    <div style="text-align: center; margin-top: 60px;">
      <h3>Ready to join us?</h3>
      <a class="btn" href="../apply.html">Apply Now</a>
    </div>
  </section>

  <footer>© 2026 UN4STEM</footer>

</div>

<!-- IMPORTANT: Load data first, then logic, then the transition script -->
<script src="../course-data.js"></script>
<script src="../course-page.js"></script>
<script src="../main.js"></script>

</body>
</html>
